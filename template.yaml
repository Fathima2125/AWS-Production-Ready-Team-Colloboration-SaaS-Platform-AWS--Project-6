AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SaaS Task Platform (FULL WORKING VERSION)

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 10
    MemorySize: 256

Resources:

# ---------------- COGNITO ----------------

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-userpool"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [implicit]
      AllowedOAuthScopes: [email, openid, profile]
      CallbackURLs:
        - http://localhost:5173
        - https://d3brddi7c2rvyc.cloudfront.net 
      
      SupportedIdentityProviders:
        - COGNITO

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${AWS::StackName}-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

# ---------------- HTTP API ----------------
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod

      CorsConfiguration:
        AllowOrigins:
           - http://localhost:5173
           - https://d3brddi7c2rvyc.cloudfront.net 
        AllowMethods:
           - GET
           - POST
           - PUT
           - DELETE
           - OPTIONS
        AllowHeaders:
           - Content-Type
           - Authorization
        AllowCredentials: false
        

      Auth:
        DefaultAuthorizer: CognitoAuth
        Authorizers:
          CognitoAuth:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                  - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"
  

# ---------------- DYNAMODB ----------------

  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: taskId
          AttributeType: S
        - AttributeName: workspaceId
          AttributeType: S
      KeySchema:
        - AttributeName: taskId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: workspaceId-index
          KeySchema:
            - AttributeName: workspaceId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  WorkspaceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workspaceId
          AttributeType: S
      KeySchema:
        - AttributeName: workspaceId
          KeyType: HASH

  WorkspaceMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workspaceId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: workspaceId
          KeyType: HASH
        - AttributeName: userId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

# ---------------- S3 / SQS / SNS ----------------

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - http://localhost:5173
              - https://d3brddi7c2rvyc.cloudfront.net 
            AllowedMethods:
              - PUT
              - GET
              - POST
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000

  TaskQueue:
    Type: AWS::SQS::Queue
    Properties:
       RedrivePolicy:
          deadLetterTargetArn: !GetAtt TaskQueueDLQ.Arn
          maxReceiveCount: 3

  TaskQueueDLQ:
    Type: AWS::SQS::Queue

  TaskTopic:
    Type: AWS::SNS::Topic

  AlarmSNSTopic:
    Type: AWS::SNS::Topic

  AlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: your-email@gmail.com
      TopicArn: !Ref AlarmSNSTopic

  TaskNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
       Protocol: email
       Endpoint: fathimayosra25@gmail.com  # 🔴 replace with your email
       TopicArn: !Ref TaskTopic

#--------MONITORING_CLOUDWATCH_ALARM-----------------

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmSNSTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref TaskFunction


# ---------------- LAMBDA FUNCTIONS ----------------

  WorkspaceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/workspace-service/
      Handler: index.handler
      Policies:
        - AmazonDynamoDBFullAccess
      Environment:
        Variables:
          WORKSPACE_TABLE: !Ref WorkspaceTable
          MEMBERS_TABLE: !Ref WorkspaceMembersTable
      Events:
        WorkspaceApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /workspace
            Method: ANY
            Auth:
                Authorizer: CognitoAuth
        
        WorkspaceOptionsApi:
          Type: HttpApi
          Properties:
              ApiId: !Ref HttpApi
              Path: /workspace
              Method: OPTIONS
              Auth:
                Authorizer: NONE
        
           

  TaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/task-service/
      Handler: index.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AmazonSQSFullAccess
        - AmazonS3FullAccess
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
          MEMBERS_TABLE: !Ref WorkspaceMembersTable
          SQS_QUEUE_URL: !Ref TaskQueue
          UPLOAD_BUCKET: !Ref UploadBucket
      Events:
        TaskApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks
            Method: ANY
            Auth:
                Authorizer: CognitoAuth

        TaskOptionsApi:
          Type: HttpApi
          Properties:
              ApiId: !Ref HttpApi
              Path: /tasks
              Method: OPTIONS
              Auth:
                Authorizer: NONE
            

  MembersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/members-service/
      Handler: index.handler
      Policies:
        - AmazonDynamoDBFullAccess
      Environment:
        Variables:
          MEMBERS_TABLE: !Ref WorkspaceMembersTable
      Events:
        MembersApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /members
            Method: ANY
            Auth:
                Authorizer: CognitoAuth

        MembersOptionsApi:
          Type: HttpApi
          Properties:
              ApiId: !Ref HttpApi
              Path: /members
              Method: OPTIONS
              Auth:
                Authorizer: NONE
           

  UploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/upload-url/
      Handler: index.handler
      Policies:
        - AmazonS3FullAccess
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref UploadBucket
      Events:
        UploadApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /upload-url
            Method: ANY
            Auth:
                Authorizer: CognitoAuth

        UploadOptionsApi:
          Type: HttpApi
          Properties:
              ApiId: !Ref HttpApi
              Path: /upload-url
              Method: OPTIONS
              Auth:
                Authorizer: NONE
           

  DownloadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/download-url/
      Handler: index.handler
      Policies:
        - AmazonS3FullAccess
      Environment:
        Variables:
          UPLOAD_BUCKET: !Ref UploadBucket
      Events:
        DownloadApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /download-url
            Method: ANY
            Auth:
                Authorizer: CognitoAuth

        DownloadOptionsApi:
          Type: HttpApi
          Properties:
              ApiId: !Ref HttpApi
              Path: /download-url
              Method: OPTIONS
              Auth:
                Authorizer: NONE
            

  ConsumerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/consumer-service/
      Handler: index.handler
      Policies:
        - AmazonSNSFullAccess
        - AmazonSQSFullAccess
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref TaskTopic
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt TaskQueue.Arn
            BatchSize: 1

# ---------------- FRONTEND (S3 + CLOUDFRONT) ----------------

  FrontendBucket:
    Type: AWS::S3::Bucket
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"
  

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

# ---------------- OUTPUTS ----------------

Outputs:

  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  CognitoLoginUrl:
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=token&scope=openid+email+profile&redirect_uri=https://d3brddi7c2rvyc.cloudfront.net "


  FrontendURL:
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  BucketName:
    Value: !Ref FrontendBucket


